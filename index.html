<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Frio da Madrugada</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1a1a1a 0%, #000 60%);
  font-family: Arial, sans-serif;
}

.container{
  width:100%;
  max-width:420px;
  padding:20px;
}

.card{
  background:#111;
  padding:35px 25px;
  border-radius:20px;
  box-shadow:0 0 50px rgba(255,120,0,0.4);
  color:white;
  text-align:center;
}

h1{
  margin-bottom:25px;
  font-size:24px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border:none;
  border-radius:14px;
  background:#1c1c1c;
  color:white;
  font-size:15px;
}

input:focus{
  outline:none;
  box-shadow:0 0 15px rgba(255,120,0,0.6);
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#ff7a00,#ff3c00);
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(255,120,0,0.8);
}

.footer{
  margin-top:20px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>🔥 Frio da Madrugada</h1>
    
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    
    <button id="loginBtn">Entrar</button>

    <div class="footer">
      © 2026 Frio da Madrugada
    </div>
  </div>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

  const client = window.supabase.createClient(
    "https://qzelobrvpitgvkuujwzi.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZWxvYnJ2cGl0Z3ZrdXVqd3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2Nzc0NjQsImV4cCI6MjA4NzI1MzQ2NH0.eS-CxNvPrx5SZ5KRqPCFGZhoCijJ9HzaqJ_mOA_gKvI"
  );

  const btn = document.getElementById("loginBtn");

  btn.addEventListener("click", async () => {

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { error } = await client.auth.signInWithPassword({
      email,
      password: senha
    });

    if(error){
      alert("Erro: " + error.message);
    } else {
      window.location.href = "painel.html";
    }

  });

});
</script>

</body>
</html>
