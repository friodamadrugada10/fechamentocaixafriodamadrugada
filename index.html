<script>
const supabase = window.supabase.createClient(
  "https://qzelobrvpitgvkuujwzi.supabase.co",
  "SUA_CHAVE_PUBLICA_AQUI"
);

document.addEventListener("DOMContentLoaded", async () => {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    mostrarLogin();
  } else {
    verificarPerfil(user.id);
  }
});

async function verificarPerfil(uid) {
  const { data, error } = await supabase
    .from("perfis")
    .select("role")
    .eq("id", uid)
    .single();

  if (error || !data) {
    alert("Usuário sem perfil definido");
    return;
  }

  if (data.role === "admin") {
    mostrarAdmin();
  } else if (data.role === "caixa") {
    mostrarCaixa();
  }
}

function mostrarLogin() {
  document.body.innerHTML = `
    <div class="card">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="senha" placeholder="Senha">
      <button onclick="login()">Entrar</button>
    </div>
  `;
}

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    alert("Erro no login");
  } else {
    location.reload();
  }
}

function mostrarAdmin() {
  document.querySelector(".card").innerHTML += `
    <button onclick="verRelatorios()">Ver Relatórios</button>
  `;
}

function mostrarCaixa() {
  console.log("Usuário é caixa");
}

async function salvar() {
  const { error } = await supabase
    .from('fechamentos')
    .insert([
      {
        DATA: document.getElementById('data').value,
        TURNO: document.getElementById('turno').value,
        CAIXA_INICIO: parseFloat(document.getElementById('caixa_inicial').value),
        DINHEIRO: parseFloat(document.getElementById('dinheiro').value),
        PIX: parseFloat(document.getElementById('pix').value),
        DEBITO: parseFloat(document.getElementById('debito').value),
        CREDITO: parseFloat(document.getElementById('credito').value),
        IFOOD: parseFloat(document.getElementById('ifood').value),
        RETIRADAS: parseFloat(document.getElementById('retiradas').value),
        SUPRIMENTO: parseFloat(document.getElementById('suprimento').value),
        CAIXA_FINAL: parseFloat(document.getElementById('caixa_final').value)
      }
    ])

  if (error) {
    alert("Erro ao salvar");
  } else {
    alert("Fechamento salvo com sucesso 🔥");
    location.reload();
  }
}
</script>
