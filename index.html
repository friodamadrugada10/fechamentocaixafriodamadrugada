<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fechamento de Caixa - Frio da Madrugada</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#0d0d0d;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#1a1a1a;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 0 30px orange;
}

input, select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:orange;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff8800;
}
</style>
</head>
<body>

<div class="card">
<h2>FRIO DA MADRUGADA</h2>
<h3>Novo Fechamento</h3>

<input type="date" id="data">

<select id="turno">
<option>Manhã</option>
<option>Noite</option>
</select>

<input type="number" step="0.01" placeholder="Caixa Inicial" id="caixa_inicial">
<input type="number" step="0.01" placeholder="Dinheiro" id="dinheiro">
<input type="number" step="0.01" placeholder="Pix" id="pix">
<input type="number" step="0.01" placeholder="Débito" id="debito">
<input type="number" step="0.01" placeholder="Crédito" id="credito">
<input type="number" step="0.01" placeholder="iFood" id="ifood">
<input type="number" step="0.01" placeholder="Retiradas" id="retiradas">
<input type="number" step="0.01" placeholder="Suprimento" id="suprimento">
<input type="number" step="0.01" placeholder="Caixa Final" id="caixa_final">

<button onclick="salvar()">Salvar Fechamento</button>

</div>

<script>
const supabase = window.supabase.createClient(
"https://qzelobrvpitgvkuujwzi.supabase.co",
"sb_publishable_bQSqBS9RQeaySWKneAKHNA_CeOSf93U"
);

async function salvar(){

const { error } = await supabase
.from('fechamentos')
.insert([
{
DATA: document.getElementById('data').value,
TURNO: document.getElementById('turno').value,
CAIXA_INICIO: parseFloat(document.getElementById('caixa_inicial').value),
DINHEIRO: parseFloat(document.getElementById('dinheiro').value),
PIX: parseFloat(document.getElementById('pix').value),
DEBITO: parseFloat(document.getElementById('debito').value),
CREDITO: parseFloat(document.getElementById('credito').value),
IFOOD: parseFloat(document.getElementById('ifood').value),
RETIRADAS: parseFloat(document.getElementById('retiradas').value),
SUPRIMENTO: parseFloat(document.getElementById('suprimento').value),
CAIXA_FINAL: parseFloat(document.getElementById('caixa_final').value)
}
])

if(error){
alert("Erro ao salvar: " + error.message)
}else{
alert("Fechamento salvo com sucesso 🔥")
location.reload()
}

}
</script>

</body>
</html>
