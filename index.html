<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRIO DA MADRUGADA - Fechamento de Caixa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #1a1a1a;
    padding: 30px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 0 25px rgba(255, 120, 0, 0.4);
}
h1 {
    text-align: center;
    color: #ff7a00;
}
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}
button {
    background: #ff7a00;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
button:hover {
    background: #ff5500;
}
.hidden {
    display: none;
}
.menu button {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
<h1>FRIO DA MADRUGADA</h1>
<p>Fechamento de Caixa</p>

<input type="text" id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>
<p id="erro" style="color:red;"></p>
</div>

<div class="container hidden" id="painel">
<h1>Painel</h1>
<p id="tipoUsuario"></p>

<div class="menu" id="menuAdmin" style="display:none;">
<button onclick="alert('Tela de Lançamento')">Novo Fechamento</button>
<button onclick="alert('Tela de Relatórios')">Relatórios</button>
</div>

<div class="menu" id="menuCaixa" style="display:none;">
<button onclick="alert('Tela de Lançamento')">Novo Fechamento</button>
</div>

<button onclick="logout()">Sair</button>
</div>

<script>
function login() {
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    if (usuario === "alexandre" && senha === "1234") {
        entrar("Administrador");
    } 
    else if (usuario === "jonata" && senha === "1234") {
        entrar("Administrador");
    }
    else if (usuario === "caixa" && senha === "1234") {
        entrar("Caixa");
    }
    else {
        document.getElementById("erro").innerText = "Usuário ou senha incorretos";
    }
}

function entrar(tipo) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("painel").classList.remove("hidden");
    document.getElementById("tipoUsuario").innerText = "Perfil: " + tipo;

    if (tipo === "Administrador") {
        document.getElementById("menuAdmin").style.display = "block";
    } else {
        document.getElementById("menuCaixa").style.display = "block";
    }
}

function logout() {
    location.reload();
}
</script>

</body>
</html>
