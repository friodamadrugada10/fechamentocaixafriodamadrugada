<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Frio da Madrugada</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#0d0d0d;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:Arial;
}
.card{
  background:#1a1a1a;
  padding:30px;
  border-radius:20px;
  width:350px;
  box-shadow:0 0 40px rgba(255,120,0,0.6);
  color:white;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:8px;
}
button{
  width:100%;
  padding:14px;
  background:orange;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔥 Frio da Madrugada</h2>
  <input type="email" id="email" placeholder="E-mail">
  <input type="password" id="senha" placeholder="Senha">
  <button id="loginBtn">Entrar</button>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

  const client = window.supabase.createClient(
    "https://qzelobrvpitgvkuujwzi.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZWxvYnJ2cGl0Z3ZrdXVqd3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2Nzc0NjQsImV4cCI6MjA4NzI1MzQ2NH0.eS-CxNvPrx5SZ5KRqPCFGZhoCijJ9HzaqJ_mOA_gKvI"
  );

  const btn = document.getElementById("loginBtn");

  btn.addEventListener("click", async () => {

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { error } = await client.auth.signInWithPassword({
      email,
      password: senha
    });

    if(error){
      alert("Erro: " + error.message);
    } else {
      window.location.href = "painel.html";
    }

  });

});
</script>

</body>
</html>
