<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel - Frio da Madrugada</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#0d0d0d;
  color:white;
  font-family:Arial;
  margin:0;
  padding:40px;
}

h1{
  color:orange;
}

.box{
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(255,140,0,0.4);
}

button{
  padding:10px 15px;
  background:orange;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>🔥 Painel Frio da Madrugada</h1>
<p id="usuarioInfo"></p>

<div id="areaAdmin" class="box hidden">
  <h2>📊 Área Admin</h2>
  <p>Visualizar relatórios</p>
  <p>Ver todos os fechamentos</p>
</div>

<div id="areaCaixa" class="box hidden">
  <h2>💰 Área Caixa</h2>
  <p>Inserir novo fechamento</p>
</div>

<button onclick="logout()">Sair</button>

<script>

const supabase = window.supabase.createClient(
  "https://qzelobrvpitgvkuujwzi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZWxvYnJ2cGl0Z3ZrdXVqd3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2Nzc0NjQsImV4cCI6MjA4NzI1MzQ2NH0.eS-CxNvPrx5SZ5KRqPCFGZhoCijJ9HzaqJ_mOA_gKvI"
);

async function iniciarPainel(){

  const { data: { user } } = await supabase.auth.getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  // 🔥 AQUI MUDAMOS PARA "perfis"
  const { data: perfil, error } = await supabase
    .from("perfis")
    .select("*")
    .eq("id", user.id)
    .single();

  if(error){
    alert("Erro ao buscar perfil");
    console.log(error);
    return;
  }

  document.getElementById("usuarioInfo").innerText =
    "Logado como: " + user.email + " | Tipo: " + perfil.role;

  if(perfil.role === "admin"){
    document.getElementById("areaAdmin").classList.remove("hidden");
    document.getElementById("areaCaixa").classList.remove("hidden");
  }

  if(perfil.role === "caixa"){
    document.getElementById("areaCaixa").classList.remove("hidden");
  }

}

async function logout(){
  await supabase.auth.signOut();
  window.location.href = "index.html";
}

iniciarPainel();

</script>

</body>
</html>
