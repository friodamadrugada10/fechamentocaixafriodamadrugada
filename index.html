<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRIO DA MADRUGADA - Fechamento de Caixa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 0 25px rgba(255,120,0,0.4);
}
h1 {
    text-align: center;
    color: #ff7a00;
}
input, select, button {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 6px;
    border: none;
}
button {
    background: #ff7a00;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
button:hover {
    background: #ff5500;
}
.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
<h1>FRIO DA MADRUGADA</h1>
<p>Fechamento de Caixa</p>

<input type="text" id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p id="erro" style="color:red;"></p>
</div>

<div class="container hidden" id="painel">
<h1>Painel</h1>
<p id="tipoUsuario"></p>

<button onclick="mostrarLancamento()">Novo Fechamento</button>
<button id="btnRelatorio" onclick="alert('Relatórios em breve')" style="display:none;">Relatórios</button>
<button onclick="logout()">Sair</button>
</div>

<div class="container hidden" id="lancamento">
<h1>Novo Fechamento</h1>

<input type="date" id="data">

<select id="turno">
<option value="Manhã">Manhã</option>
<option value="Noite">Noite</option>
</select>

<input type="number" placeholder="Caixa Início" id="caixaInicio">
<input type="number" placeholder="Caixa Final" id="caixaFinal">
<input type="number" placeholder="Suprimento" id="suprimento">

<input type="number" placeholder="Dinheiro" id="dinheiro">
<input type="number" placeholder="PIX" id="pix">
<input type="number" placeholder="Débito" id="debito">
<input type="number" placeholder="Crédito" id="credito">
<input type="number" placeholder="iFood" id="ifood">
<input type="number" placeholder="Retiradas" id="retiradas">

<button onclick="salvar()">Salvar Fechamento</button>
<button onclick="voltar()">Voltar</button>

</div>

<script>
let tipoUsuario = "";

function login() {
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    if ((usuario === "alexandre" || usuario === "jonata") && senha === "1234") {
        tipoUsuario = "Administrador";
        entrar();
    } 
    else if (usuario === "caixa" && senha === "1234") {
        tipoUsuario = "Caixa";
        entrar();
    }
    else {
        document.getElementById("erro").innerText = "Usuário ou senha incorretos";
    }
}

function entrar() {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("painel").classList.remove("hidden");
    document.getElementById("tipoUsuario").innerText = "Perfil: " + tipoUsuario;

    if (tipoUsuario === "Administrador") {
        document.getElementById("btnRelatorio").style.display = "block";
    }
}

function mostrarLancamento() {
    document.getElementById("painel").classList.add("hidden");
    document.getElementById("lancamento").classList.remove("hidden");
}

function voltar() {
    document.getElementById("lancamento").classList.add("hidden");
    document.getElementById("painel").classList.remove("hidden");
}

function salvar() {
    alert("Fechamento salvo (ainda não conectado ao banco)");
}

function logout() {
    location.reload();
}
</script>

</body>
</html>
