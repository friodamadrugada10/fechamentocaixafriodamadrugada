<!DOCTYPE html>
<html>
<head>
  <title>Painel - Frio da Madrugada</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
  box-sizing: border-box;
}
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1a1a 0%, #000 60%);
  color:white;
}

.container{
  max-width:480px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,120,0,0.2);
}

h1{
  text-align:center;
  margin-bottom:25px;
  font-size:26px;
}

input, select{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border-radius:14px;
  border:none;
  background:#1c1c1c;
  color:white;
  font-size:16px;
}

input:focus, select:focus{
  outline:none;
  box-shadow:0 0 15px rgba(255,120,0,0.6);
}

.btn-primary{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#ff7a00,#ff3c00);
  color:white;
  font-weight:bold;
  font-size:16px;
  margin-top:10px;
}

.btn-secondary{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #333;
  background:#1a1a1a;
  color:white;
}
</style>
</head>

<body>
  <div class="container">
    <div class="card">
<h1>FECHAMENTO DE CAIXA🔥</h1>
<button onclick="window.location.href='relatorio.html'">
📊 Ver Relatório
  </button>

<div style="margin-top:30px;">
  <h3>Novo Fechamento</h3>

  <input type="date" id="data"><br><br>

  <select id="turno">
    <option value="Manhã">Manhã</option>
    <option value="Tarde">Tarde</option>
    <option value="Noite">Noite</option>
  </select>

  <input type="number" id="caixa_inicio" placeholder="Caixa Inicial"><br><br>
  <input type="number" id="dinheiro" placeholder="Dinheiro"><br><br>
  <input type="number" id="pix" placeholder="Pix"><br><br>
  <input type="number" id="debito" placeholder="Débito"><br><br>
  <input type="number" id="credito" placeholder="Crédito"><br><br>
  <input type="number" id="ifood" placeholder="iFood"><br><br>
  <input type="number" id="retiradas" placeholder="Retiradas"><br><br>
  <input type="number" id="caixa_final" placeholder="Caixa Final" step="0.01">
<input type="number" id="diferenca" placeholder="Diferença (sobra ou falta)" step="0.01">
  <div id="resumoFinal" style="margin-top:20px;font-weight:bold;"></div>
  <button id="salvarFechamento">Salvar Fechamento</button>
</div>

<br>
<button id="logoutBtn">Sair</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// 🔑 CONEXÃO SUPABASE (UMA VEZ SÓ)
const client = window.supabase.createClient(
  "https://qzelobrvpitgvkuujwzi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZWxvYnJ2cGl0Z3ZrdXVqd3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2Nzc0NjQsImV4cCI6MjA4NzI1MzQ2NH0.eS-CxNvPrx5SZ5KRqPCFGZhoCijJ9HzaqJ_mOA_gKvI"
);

// 🔐 PROTEÇÃO + INICIALIZAÇÃO
window.addEventListener("DOMContentLoaded", async () => {
function atualizarResumo() {

  const dinheiro = parseFloat(document.getElementById("dinheiro").value) || 0;
  const pix = parseFloat(document.getElementById("pix").value) || 0;
  const debito = parseFloat(document.getElementById("debito").value) || 0;
  const credito = parseFloat(document.getElementById("credito").value) || 0;
  const ifood = parseFloat(document.getElementById("ifood").value) || 0;
  const retiradas = parseFloat(document.getElementById("retiradas").value) || 0;
  const caixaFinal = parseFloat(document.getElementById("caixa_final").value) || 0;

  const totalVendas = dinheiro + pix + debito + credito + ifood;
  const previsto = totalVendas - retiradas;

  const diferenca = caixaFinal - previsto;

  const cor = diferenca < 0 ? "red" : "lime";

  document.getElementById("resumoFinal").innerHTML = `
    Total vendas: R$ ${totalVendas.toFixed(2)}<br>
    Previsto em caixa: R$ ${previsto.toFixed(2)}<br>
    <span style="color:${cor}">
      🔥 Diferença: R$ ${diferenca.toFixed(2)}
    </span>
  `;
}
  [
 "dinheiro",
 "pix",
 "debito",
 "credito",
 "ifood",
 "retiradas",
 "caixa_final"
].forEach(id => {
  document.getElementById(id).addEventListener("input", atualizarResumo);
});
  // Data automática
  document.getElementById("data").value =
    new Date().toISOString().split("T")[0];

  // Verificar login
  const { data } = await client.auth.getSession();
  if (!data.session) {
    window.location.href = "index.html";
    return;
  }


  // 🔥 SALVAR FECHAMENTO
  document.getElementById("salvarFechamento")
  .addEventListener("click", async () => {

    const dataFechamento = document.getElementById("data").value;
    const turno = document.getElementById("turno").value;

    const caixa_inicio = parseFloat(document.getElementById("caixa_inicio").value) || 0;
    const dinheiro = parseFloat(document.getElementById("dinheiro").value) || 0;
    const pix = parseFloat(document.getElementById("pix").value) || 0;
    const debito = parseFloat(document.getElementById("debito").value) || 0;
    const credito = parseFloat(document.getElementById("credito").value) || 0;
    const ifood = parseFloat(document.getElementById("ifood").value) || 0;
    const retiradas = parseFloat(document.getElementById("retiradas").value) || 0;

    const total_vendas = dinheiro + pix + debito + credito + ifood;
    const total_faturado = total_vendas - caixa_inicio;
    const caixa_final = parseFloat(document.getElementById("caixa_final").value) || 0;
    const diferenca = parseFloat(document.getElementById("diferenca").value) || 0;
    
    const { error } = await client
      .from("fechamentos")
      .insert([{
        data: dataFechamento,
        turno,
        caixa_inicio,
        dinheiro,
        pix,
        debito,
        credito,
        ifood,
        retiradas,
        total_vendas,
        total_faturado,
        caixa_final,
        diferenca
      }]);

    if(error){
      alert("Erro ao salvar: " + error.message);
    } else {
      alert("Fechamento salvo com sucesso 🔥");
    }

  });

  // 🚪 LOGOUT
  document.getElementById("logoutBtn")
  .addEventListener("click", async () => {
    await client.auth.signOut();
    window.location.href = "index.html";
  });

  });
</script>
    </div>
  </div>
</body>
</html>
