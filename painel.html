<!DOCTYPE html>
<html>
<head>
  <title>Painel - Frio da Madrugada</title>

  <h2>Resumo do Dia</h2>
<div id="resumo" style="margin-bottom:40px;"></div>
  
</head>

<body style="background:black;color:white;text-align:center;margin-top:60px;">

<h1>Bem-vindo ao Painel 🔥</h1>

<div style="margin-top:30px;">
  <h3>Novo Fechamento</h3>

  <input type="date" id="data"><br><br>

  <select id="turno">
    <option value="Manhã">Manhã</option>
    <option value="Tarde">Tarde</option>
    <option value="Noite">Noite</option>
  </select><br><br>

  <input type="number" id="caixa_inicio" placeholder="Caixa Inicial"><br><br>
  <input type="number" id="dinheiro" placeholder="Dinheiro"><br><br>
  <input type="number" id="pix" placeholder="Pix"><br><br>
  <input type="number" id="debito" placeholder="Débito"><br><br>
  <input type="number" id="credito" placeholder="Crédito"><br><br>
  <input type="number" id="ifood" placeholder="iFood"><br><br>
  <input type="number" id="retiradas" placeholder="Retiradas"><br><br>

  <button id="salvarFechamento">Salvar Fechamento</button>
</div>

<br>
<button id="logoutBtn">Sair</button>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// 🔑 CONEXÃO SUPABASE
const client = window.supabase.createClient(
  "https://qzelobrvpitgvkuujwzi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZWxvYnJ2cGl0Z3ZrdXVqd3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2Nzc0NjQsImV4cCI6MjA4NzI1MzQ2NH0.eS-CxNvPrx5SZ5KRqPCFGZhoCijJ9HzaqJ_mOA_gKvI"
);

// ===== FUNÇÃO RESUMO =====
async function carregarResumo() {
  const hoje = new Date().toISOString().split('T')[0];

  const { data, error } = await client
    .from("fechamentos")
    .select("*")
    .gte("created_at", hoje + "T00:00:00")
    .lte("created_at", hoje + "T23:59:59");

  if (error) {
    console.log(error);
    return;
  }

  let totalDinheiro = 0;
  let totalPix = 0;
  let totalCredito = 0;
  let totalIfood = 0;
  let totalRetiradas = 0;

  data.forEach(item => {
    totalDinheiro += Number(item.dinheiro || 0);
    totalPix += Number(item.pix || 0);
    totalCredito += Number(item.credito || 0);
    totalIfood += Number(item.ifood || 0);
    totalRetiradas += Number(item.retiradas || 0);
  });

  const totalGeral = totalDinheiro + totalPix + totalCredito + totalIfood;
  const liquido = totalGeral - totalRetiradas;

  document.getElementById("resumo").innerHTML = `
    💵 Dinheiro: R$ ${totalDinheiro.toFixed(2)} <br>
    📲 PIX: R$ ${totalPix.toFixed(2)} <br>
    💳 Crédito: R$ ${totalCredito.toFixed(2)} <br>
    🛵 iFood: R$ ${totalIfood.toFixed(2)} <br><br>
    🧾 Total Geral: <b>R$ ${totalGeral.toFixed(2)}</b> <br>
    ➖ Retiradas: R$ ${totalRetiradas.toFixed(2)} <br><br>
    🔥 Lucro Líquido: <b>R$ ${liquido.toFixed(2)}</b>
  `;
}

carregarResumo();

</script>
<script>

// 🔑 CONEXÃO SUPABASE
const client = window.supabase.createClient(
  "https://qzelobrvpitgvkuujwzi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6ZWxvYnJ2cGl0Z3ZrdXVqd3ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2Nzc0NjQsImV4cCI6MjA4NzI1MzQ2NH0.eS-CxNvPrx5SZ5KRqPCFGZhoCijJ9HzaqJ_mOA_gKvI"
);

// 🔐 PROTEÇÃO + INICIALIZAÇÃO
window.addEventListener("DOMContentLoaded", async () => {

  // Definir data de hoje automática
  document.getElementById("data").value =
    new Date().toISOString().split("T")[0];

  // Verificar sessão
  const { data } = await client.auth.getSession();
  if (!data.session) {
    window.location.href = "index.html";
    return;
  }

  // 🔥 SALVAR FECHAMENTO
  document.getElementById("salvarFechamento")
  .addEventListener("click", async () => {

    const dataFechamento = document.getElementById("data").value;
    const turno = document.getElementById("turno").value;

    const caixa_inicio = parseFloat(document.getElementById("caixa_inicio").value) || 0;
    const dinheiro = parseFloat(document.getElementById("dinheiro").value) || 0;
    const pix = parseFloat(document.getElementById("pix").value) || 0;
    const debito = parseFloat(document.getElementById("debito").value) || 0;
    const credito = parseFloat(document.getElementById("credito").value) || 0;
    const ifood = parseFloat(document.getElementById("ifood").value) || 0;
    const retiradas = parseFloat(document.getElementById("retiradas").value) || 0;

    // 📊 CÁLCULOS
    const total_vendas = dinheiro + pix + debito + credito + ifood;
    const total_faturado = total_vendas - caixa_inicio;
    const caixa_final = total_faturado - retiradas;

    // 💾 SALVAR NO BANCO
    const { error } = await client
      .from("fechamentos")
      .insert([{
        data: dataFechamento,
        turno,
        caixa_inicio,
        dinheiro,
        pix,
        debito,
        credito,
        ifood,
        retiradas,
        total_vendas,
        total_faturado,
        caixa_final
      }]);

    if(error){
      alert("Erro ao salvar: " + error.message);
    } else {
      alert("Fechamento salvo com sucesso 🔥");
    }

  });

  // 🚪 LOGOUT
  document.getElementById("logoutBtn")
  .addEventListener("click", async () => {
    await client.auth.signOut();
    window.location.href = "index.html";
  });

});

</script>

</body>
</html>
